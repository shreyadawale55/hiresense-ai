# ─────────────────────────────────────────────
#  HireSense AI — Production Docker Compose
#  SDG 8: Decent Work and Economic Growth
# ─────────────────────────────────────────────

x-common-env: &common-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  OLLAMA_URL: http://ollama:11434
  MODEL_PATH: /app/models/resume_scorer.pt
  SECRET_KEY: ${SECRET_KEY}
  ENVIRONMENT: ${ENVIRONMENT:-production}

services:
  # ── Database ──────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hiresense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hiresense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hiresense_secret_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-hiresense_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hiresense} -d ${POSTGRES_DB:-hiresense_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiresense_net

  # ── Cache / Message Broker ────────────────
  redis:
    image: redis:7-alpine
    container_name: hiresense_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hiresense_net

  # ── FastAPI Backend ───────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: hiresense_backend
    restart: unless-stopped
    environment:
      <<: *common-env
    volumes:
      - resume_uploads:/app/uploads
      - model_store:/app/models
      - app_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - hiresense_net

  # ── Celery Worker ─────────────────────────
  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: hiresense_worker
    restart: unless-stopped
    environment:
      <<: *common-env
      CELERY_INCLUDE_TASKS: "1"
    volumes:
      - resume_uploads:/app/uploads
      - model_store:/app/models
      - app_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A celery_app worker --loglevel=info --concurrency=4 -Q default,ai_scoring,llm_explain
    networks:
      - hiresense_net

  # ── Celery Beat (Scheduler) ───────────────
  beat:
    build:
      context: .
      dockerfile: workers/Dockerfile
    container_name: hiresense_beat
    restart: unless-stopped
    environment:
      <<: *common-env
      CELERY_INCLUDE_TASKS: "1"
    depends_on:
      - redis
    command: celery -A celery_app beat --loglevel=info
    networks:
      - hiresense_net

  # ── Flower (Celery Monitor) ───────────────
  flower:
    build:
      context: .
      dockerfile: flower/Dockerfile
    container_name: hiresense_flower
    restart: unless-stopped
    environment:
      <<: *common-env
      CELERY_INCLUDE_TASKS: "0"
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin123}
    networks:
      - hiresense_net

  # ── Ollama (LLM Server — Mistral 7B) ─────
  ollama:
    image: ollama/ollama:latest
    container_name: hiresense_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - hiresense_net

  # ── AI Model Server (PyTorch) ────────────
  ai_model:
    build:
      context: .
      dockerfile: ai_models/Dockerfile
    container_name: hiresense_ai_model
    restart: unless-stopped
    environment:
      MODEL_PATH: /app/models/resume_scorer.pt
      MODEL_PORT: 8001
      DEVICE: ${DEVICE:-cpu}
    volumes:
      - model_store:/app/models
    ports:
      - "8001:8001"
    networks:
      - hiresense_net

  # ── React Frontend ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    container_name: hiresense_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - hiresense_net

  # ── Nginx Reverse Proxy ───────────────────
  nginx:
    image: nginx:alpine
    container_name: hiresense_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - hiresense_net

  # ── Prometheus (Metrics) ──────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: hiresense_prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - hiresense_net

  # ── Grafana (Dashboards) ──────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: hiresense_grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - hiresense_net

# ── Volumes ───────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  resume_uploads:
  model_store:
  app_data:
  ollama_data:
  prometheus_data:
  grafana_data:

# ── Networks ──────────────────────────────────
networks:
  hiresense_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
