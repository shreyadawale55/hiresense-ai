global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: 'hiresense-ai'
    environment: 'production'

scrape_configs:
  - job_name: 'hiresense-backend'
    static_configs:
      - targets: ['backend:8000']
    metrics_path: '/metrics'

  - job_name: 'hiresense-ai-model'
    static_configs:
      - targets: ['ai_model:8001']
    metrics_path: '/metrics'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
